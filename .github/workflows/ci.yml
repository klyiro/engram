name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Covers the ranking/authority math the product's central claim rests on:
      # a retired fact must stop surfacing. See lib/vault/stale-truth.test.ts.
      - name: Test
        run: bun test

      # `next build` type-checks (tsc) and compiles every route — the real gate.
      - name: Build
        run: bun run build
