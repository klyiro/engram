# Render blueprint — Docker web service + a persistent disk for the vault + state.
# One-click via the "Deploy to Render" button (repo must be public or connected).
services:
  - type: web
    name: engram
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: engram-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ENGRAM_DATA_DIR
        value: /data
      - key: GIT_SYNC_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_APP_NAME
        value: Engram
      - key: AUTH_SECRET
        generateValue: true # auto-generated on deploy
      - key: APP_URL
        sync: false # set to your Render URL
      - key: ALLOWED_EMAILS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Optional: GITHUB_CLIENT_ID/SECRET (OAuth repo connect), ANTHROPIC_API_KEY + HARNESS_ENABLED
