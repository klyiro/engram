name: Release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
#
# Two images, deliberately. `engram` is the stdio MCP server (Dockerfile.mcp) — the official MCP
# registry entry io.github.rwnalds/engram declares that exact OCI reference in server.json, so
# repointing this tag at anything else breaks the registry listing. `engram-app` is the dashboard
# + HTTP MCP server (Dockerfile), which is what Railway and Render deploy.
#
# Before this workflow existed the ghcr images were pushed by hand, so they drifted from `main`
# with nothing to reproduce them.

on:
  push:
    tags: ["v*"]
  # Lets you re-run a release build without moving the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # The version lives in three hand-maintained places. If they disagree, server.json ends up
  # advertising an OCI reference that was never built — a 404 for anyone following the registry.
  verify-version:
    name: verify version matches the tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - id: v
        name: Check package.json and server.json against the tag
        run: |
          set -euo pipefail
          RAW="${{ inputs.tag || github.ref_name }}"
          VERSION="${RAW#v}"
          PKG=$(jq -r .version package.json)
          SRV=$(jq -r .version server.json)
          OCI=$(jq -r '.packages[0].identifier' server.json)

          echo "tag=$VERSION  package.json=$PKG  server.json=$SRV"
          echo "server.json OCI identifier: $OCI"

          fail=0
          [ "$PKG" = "$VERSION" ] || { echo "::error::package.json version ($PKG) != tag ($VERSION)"; fail=1; }
          [ "$SRV" = "$VERSION" ] || { echo "::error::server.json version ($SRV) != tag ($VERSION)"; fail=1; }
          [ "$OCI" = "${{ env.REGISTRY }}/${{ github.repository }}:$VERSION" ] || {
            echo "::error::server.json packages[0].identifier ($OCI) does not point at ${{ env.REGISTRY }}/${{ github.repository }}:$VERSION"; fail=1; }
          [ "$fail" -eq 0 ] || exit 1

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Same gate as CI. A tag that cannot build must not become a published image.
  verify-build:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun test
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  images:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [verify-version, verify-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          # The MCP registry's contract. Do not rename or repoint.
          - name: engram (stdio MCP)
            image: engram
            dockerfile: Dockerfile.mcp
          # What the Railway/Render deploy buttons pull.
          - name: engram-app (dashboard + HTTP MCP)
            image: engram-app
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.verify-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Show the published manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.verify-version.outputs.version }}

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [verify-version, images]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          set -euo pipefail
          {
            echo "## Images"
            echo
            echo '```'
            echo "# stdio MCP server (Claude Desktop, Cursor, registries)"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/engram:${VERSION}"
            echo
            echo "# dashboard + HTTP MCP server (self-hosted team)"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/engram-app:${VERSION}"
            echo '```'
            echo
            echo "Both are multi-arch (linux/amd64, linux/arm64)."
          } > notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file notes.md --generate-notes
